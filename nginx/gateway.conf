# TradeWise Nginx Config with SSL + Prerender (SEO)
# Managed by Certbot - preserves SSL certificates

# ─── Bot User-Agent Detection ──────────────────────────
map $http_user_agent $is_bot {
    default 0;
    ~*googlebot 1;
    ~*bingbot 1;
    ~*slurp 1;
    ~*baiduspider 1;
    ~*duckduckbot 1;
    ~*yandexbot 1;
    ~*facebookexternalhit 1;
    ~*twitterbot 1;
    ~*linkedinbot 1;
    ~*whatsapp 1;
    ~*telegrambot 1;
    ~*applebot 1;
    ~*semrushbot 1;
    ~*ahrefsbot 1;
    ~*gptbot 1;
    ~*chatgpt 1;
    ~*oai-searchbot 1;
    ~*claudebot 1;
    ~*anthropic 1;
    ~*perplexitybot 1;
    ~*cohere-ai 1;
    ~*bytespider 1;
    ~*meta-externalagent 1;
    ~*amazonbot 1;
    ~*youbot 1;
    ~*ccbot 1;
    ~*diffbot 1;
    ~*bingpreview 1;
    ~*adidxbot 1;
    ~*msnbot 1;
    ~*google-inspectiontool 1;
}

# Route bots to prerender, humans to frontend (avoid nginx "if" + proxy_pass bug)
map $is_bot $seo_upstream {
    default http://127.0.0.1:8080;
    1       http://127.0.0.1:3002;
}

# ─── Main Server (HTTPS) ───────────────────────────────
server {
    server_name mytradewiseoc.com www.mytradewiseoc.com;
    client_max_body_size 20m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === API Routes → Backend (:3000) ===
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Old /app/* bookmarks → root paths (301 permanent)
    location ~ ^/app/?(.*)$ {
        return 301 /$1$is_args$args;
    }

    # === SEO Pages: Bots → Prerender (:3002), Humans → Frontend (:8080) ===

    location = / {
        proxy_pass $seo_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=300" always;
    }

    location ~ ^/(zh|pricing|terms|privacy|refund|trading-journal|trade-diary|forex-trading-journal|crypto-trading-journal|ai-trading-journal)(/?)$ {
        proxy_pass $seo_upstream;
        proxy_set_header Host $host;
    }

    location ~ ^/blog/(monday-gap-breakout-xauusd-ea|twinklestar-kdj-bollinger-ea-mt4|turtle-system-donchian-breakout-ea-mt4|the-one-eurusd-volatility-scalper-mt4|gold-dashboard-ai-m1-scalper-mt4|xauusd-one-candle-ny-session-scalper-mt4|aquilagold-h1-dual-sma-breakout-mt4)(/?)$ {
        proxy_pass $seo_upstream;
        proxy_set_header Host $host;
    }

    # Static assets
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080/sitemap.xml;
        add_header Cache-Control "public, max-age=3600" always;
    }
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8080/robots.txt;
        add_header Cache-Control "public, max-age=86400" always;
    }
    location = /favicon.ico {
        proxy_pass http://127.0.0.1:8080/favicon.ico;
        log_not_found off;
    }

    # === Default Fallback → Frontend SPA ===
    location / {
        proxy_pass http://127.0.0.1:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mytradewiseoc.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mytradewiseoc.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ─── HTTP → HTTPS Redirect (managed by Certbot) ────────
server {
    if ($host = www.mytradewiseoc.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    if ($host = mytradewiseoc.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name mytradewiseoc.com www.mytradewiseoc.com;
    client_max_body_size 20m;
    return 404; # managed by Certbot
}
