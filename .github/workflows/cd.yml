name: CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.mytradewiseoc.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
      
      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=./kubeconfig
          kubectl set image deployment/tradewise-backend tradewise-backend=${{ secrets.DOCKER_USERNAME }}/tradewise-backend:main-${{ github.sha }} -n tradewise-staging
          kubectl set image deployment/tradewise-frontend tradewise-frontend=${{ secrets.DOCKER_USERNAME }}/tradewise-frontend:main-${{ github.sha }} -n tradewise-staging
          kubectl rollout status deployment/tradewise-backend -n tradewise-staging
          kubectl rollout status deployment/tradewise-frontend -n tradewise-staging
      
      - name: Run smoke tests
        run: |
          curl -f https://staging.mytradewiseoc.com/health || exit 1
          curl -f https://staging.mytradewiseoc.com/health/detailed || exit 1
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://mytradewiseoc.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
      
      - name: Deploy to Kubernetes (Blue-Green)
        run: |
          export KUBECONFIG=./kubeconfig
          # Deploy to green environment
          kubectl set image deployment/tradewise-backend-green tradewise-backend=${{ secrets.DOCKER_USERNAME }}/tradewise-backend:${{ github.ref_name }} -n tradewise-production
          kubectl set image deployment/tradewise-frontend-green tradewise-frontend=${{ secrets.DOCKER_USERNAME }}/tradewise-frontend:${{ github.ref_name }} -n tradewise-production
          kubectl rollout status deployment/tradewise-backend-green -n tradewise-production
          kubectl rollout status deployment/tradewise-frontend-green -n tradewise-production
          
          # Run health checks on green
          sleep 30
          kubectl exec -n tradewise-production deployment/tradewise-backend-green -- curl -f http://localhost:3000/health
          
          # Switch traffic to green
          kubectl patch service tradewise-backend -n tradewise-production -p '{"spec":{"selector":{"version":"green"}}}'
          kubectl patch service tradewise-frontend -n tradewise-production -p '{"spec":{"selector":{"version":"green"}}}'
          
          # Wait and verify
          sleep 60
          
          # Scale down blue
          kubectl scale deployment/tradewise-backend-blue --replicas=0 -n tradewise-production
          kubectl scale deployment/tradewise-frontend-blue --replicas=0 -n tradewise-production
      
      - name: Run smoke tests
        run: |
          curl -f https://mytradewiseoc.com/health || exit 1
          curl -f https://mytradewiseoc.com/health/detailed || exit 1
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }} - Version ${{ github.ref_name }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      
      - name: Rollback on failure
        if: failure()
        run: |
          export KUBECONFIG=./kubeconfig
          # Switch back to blue
          kubectl patch service tradewise-backend -n tradewise-production -p '{"spec":{"selector":{"version":"blue"}}}'
          kubectl patch service tradewise-frontend -n tradewise-production -p '{"spec":{"selector":{"version":"blue"}}}'
          kubectl scale deployment/tradewise-backend-blue --replicas=3 -n tradewise-production
          kubectl scale deployment/tradewise-frontend-blue --replicas=3 -n tradewise-production
