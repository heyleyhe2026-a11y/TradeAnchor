apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradewise-frontend
  namespace: tradewise-production
  labels:
    app: tradewise-frontend
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tradewise-frontend
      version: blue
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tradewise-frontend
        version: blue
    spec:
      containers:
      - name: tradewise-frontend
        image: tradewise/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - tradewise-frontend
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: tradewise-frontend
  namespace: tradewise-production
  labels:
    app: tradewise-frontend
spec:
  type: ClusterIP
  selector:
    app: tradewise-frontend
    version: blue
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradewise-ingress
  namespace: tradewise-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  tls:
  - hosts:
    - mytradewiseoc.com
    - www.mytradewiseoc.com
    - api.mytradewiseoc.com
    secretName: tradewise-tls
  rules:
  - host: mytradewiseoc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradewise-frontend
            port:
              number: 80
  - host: www.mytradewiseoc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradewise-frontend
            port:
              number: 80
  - host: api.mytradewiseoc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradewise-backend
            port:
              number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tradewise-frontend-hpa
  namespace: tradewise-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tradewise-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
