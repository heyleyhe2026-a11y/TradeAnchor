apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradewise-ingress
  namespace: tradewise
  annotations:
    # Nginx ingress controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://mytradewiseoc.com"
    # SSL/TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: no-referrer-when-downgrade";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - mytradewiseoc.com
    - www.mytradewiseoc.com
    - api.mytradewiseoc.com
    secretName: tradewise-tls
  rules:
  # Frontend
  - host: mytradewiseoc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradewise-frontend-service
            port:
              number: 80
  - host: www.mytradewiseoc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradewise-frontend-service
            port:
              number: 80
  # Backend API
  - host: api.mytradewiseoc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradewise-backend-service
            port:
              number: 3000
