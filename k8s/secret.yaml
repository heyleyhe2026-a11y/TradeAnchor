apiVersion: v1
kind: Secret
metadata:
  name: tradewise-secrets
  namespace: tradewise
type: Opaque
stringData:
  # Database credentials (replace with actual values)
  DATABASE_URL: "postgresql://user:password@postgres-service:5432/tradewise"
  POSTGRES_USER: "tradewise"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  REDIS_PASSWORD: ""
  MONGODB_USER: "tradewise"
  MONGODB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  # JWT secrets
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET"
  JWT_REFRESH_SECRET: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET"
  # API keys
  OPENAI_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  ANTHROPIC_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  # Payment gateways
  PAYPAL_CLIENT_ID: "CHANGE_ME_IN_PRODUCTION"
  PAYPAL_CLIENT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  STRIPE_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  # Email service
  SENDGRID_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  # Sentry
  SENTRY_DSN: "CHANGE_ME_IN_PRODUCTION"
---
# Note: In production, use external secret management like:
# - AWS Secrets Manager
# - Azure Key Vault
# - HashiCorp Vault
# - Sealed Secrets
# Never commit actual secrets to version control!
