server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html/marketing;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/rss+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === Astro Static Pages (Marketing Site) ===

    # English Landing Page (default)
    location = / {
        try_files $uri $uri.html /index.html =404;
    }

    # Chinese Landing Page
    location = /zh {
        try_files $uri/ $uri.html /zh.html =404;
    }

    # Chinese sub-pages (if added later)
    location /zh/ {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Pricing Page
    location /pricing {
        try_files $uri $uri.html /pricing.html =404;
    }

    # Legal Pages
    location /terms {
        try_files $uri $uri.html /terms.html =404;
    }

    location /privacy {
        try_files $uri $uri.html /privacy.html =404;
    }

    location /refund {
        try_files $uri $uri.html /refund.html =404;
    }

    # Sitemap & Robots (SEO)
    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # Favicon
    location = /favicon.ico {
        try_files $uri =404;
        log_not_found off;
    }

    # Static assets from Astro build
    location /_astro/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # === Fallback: Everything else → SPA or 404 ===
    # Note: /app/* and /api/* should be routed by external reverse proxy (docker compose network)
    # If you want this nginx to also proxy those, uncomment below:

    # location /app/ {
    #     proxy_pass http://frontend:80;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # location /api/ {
    #     proxy_pass http://backend:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
