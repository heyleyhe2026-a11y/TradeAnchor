services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tradewise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradewise}
      POSTGRES_USER: ${POSTGRES_USER:-tradewise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradewise}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradewise-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tradewise-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradewise-network

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: tradewise-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-tradewise}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "localhost:27017/test", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tradewise-network

  # Backend API
  backend:
    image: tradewise-backend:latest
    container_name: tradewise-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradewise}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradewise}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MONGODB_URL: mongodb://${MONGO_USERNAME:-tradewise}:${MONGO_PASSWORD}@mongodb:27017/tradewise?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://mytradewiseoc.com}
      API_BASE_URL: ${API_BASE_URL:-https://api.mytradewiseoc.com}
      SENTRY_DSN: ${SENTRY_DSN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./data/uploads:/app/packages/backend/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tradewise-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend (SPA)
  frontend:
    image: tradewise-frontend:latest
    container_name: tradewise-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tradewise-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # SEO Prerender Service (renders SPA pages for search engine crawlers)
  prerender:
    build:
      context: ./packages/prerender
      dockerfile: Dockerfile
    image: tradewise-prerender:latest
    container_name: tradewise-prerender
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      NODE_ENV: production
      FRONTEND_URL: http://frontend:8080
      CACHE_TTL: "3600000"
      RENDER_TIMEOUT: "30000"
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - tradewise-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # Gateway / Reverse Proxy (nginx) - disabled, using system nginx with Let's Encrypt
  # gateway:
  #   image: nginx:alpine
  #   container_name: tradewise-gateway
  #   ...

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: tradewise-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - tradewise-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: tradewise-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - tradewise-network

  # Node Exporter (for system metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: tradewise-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - tradewise-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  tradewise-network:
    driver: bridge
